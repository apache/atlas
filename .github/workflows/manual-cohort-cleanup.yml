name: Manual Cohort Cleanup

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number of the ring to cleanup'
        required: true
        type: string
      source:
        description: 'Source (github, custom, horizon) - leave empty for auto-detect from labels'
        required: false
        type: string
        default: ''
      path:
        description: 'Path for cohort github file - optional, overrides label detection'
        required: false
        type: string
        default: ''
      tenant_names:
        description: 'Comma-separated list of tenant names - requires source=custom'
        required: false
        type: string
        default: ''
      allow_open_pr:
        description: 'Allow cleanup on open PRs (for rolling back a specific cohort without closing the PR)'
        required: false
        type: boolean
        default: false

jobs:
  detect-cohorts:
    runs-on: ubuntu-latest
    outputs:
      cohort_paths: ${{ steps.detect.outputs.cohort_paths }}
      service_name: ${{ steps.detect.outputs.service_name }}
      image_repo: ${{ steps.detect.outputs.image_repo }}
      ring_name: ${{ steps.detect.outputs.ring_name }}
      pull_request_url: ${{ steps.detect.outputs.pull_request_url }}
      use_manual_config: ${{ steps.detect.outputs.use_manual_config }}
      resolved_source: ${{ steps.detect.outputs.resolved_source }}
    steps:
      - name: Detect cohorts from PR labels
        id: detect
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_PAT_GITHUB }}
          script: |
            const prNumber = parseInt('${{ inputs.pr_number }}');
            const manualPath = '${{ inputs.path }}';
            const manualSource = '${{ inputs.source }}';
            const tenantNames = '${{ inputs.tenant_names }}';

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const allowOpenPR = '${{ inputs.allow_open_pr }}' === 'true';
            if (pr.state !== 'closed' && !allowOpenPR) {
              core.setFailed(`PR #${prNumber} is still open. Set 'allow_open_pr' to true to force cleanup on an open PR.`);
              return;
            }
            if (pr.state !== 'closed' && allowOpenPR) {
              console.log(`⚠️ PR #${prNumber} is open. Proceeding with cleanup as allow_open_pr is set.`);
            }

            const repoName = context.repo.repo;
            const serviceName = 'atlas';
            const ringName = pr.head.ref;
            const imageRepo = `ghcr.io/atlanhq/${repoName}-${ringName}`;

            core.setOutput('service_name', serviceName);
            core.setOutput('image_repo', imageRepo);
            core.setOutput('ring_name', ringName);
            core.setOutput('pull_request_url', pr.html_url);

            // If manual path or tenant_names provided, use manual config
            if (manualPath || (manualSource === 'custom' && tenantNames)) {
              console.log('Using manual configuration (path or tenant_names provided)');
              // Default source to 'github' when path is provided without explicit source
              if (manualPath && !manualSource) {
                core.setOutput('resolved_source', 'github');
              } else {
                core.setOutput('resolved_source', manualSource);
              }
              core.setOutput('use_manual_config', 'true');
              core.setOutput('cohort_paths', JSON.stringify([]));
              return;
            }

            // Auto-detect cohort labels
            const cohortLabels = pr.labels
              .map(l => l.name)
              .filter(name => name.startsWith('cohort:github:path:'));

            if (cohortLabels.length === 0) {
              core.setFailed(`No cohort labels found on PR #${prNumber}. Add cohort:github:path:* labels or provide manual path/tenant_names.`);
              return;
            }

            // Extract paths from labels: cohort:github:path:atlas-ring-0-empty -> cohorts/atlas-ring-0-empty.json
            const cohortPaths = cohortLabels.map(label => {
              const cohortName = label.replace('cohort:github:path:', '');
              return `cohorts/${cohortName}.json`;
            });

            console.log(`Found ${cohortPaths.length} cohort(s) to cleanup:`);
            cohortPaths.forEach(p => console.log(`  - ${p}`));

            core.setOutput('use_manual_config', 'false');
            core.setOutput('cohort_paths', JSON.stringify(cohortPaths));

  cleanup-manual:
    needs: detect-cohorts
    if: needs.detect-cohorts.outputs.use_manual_config == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          export PATH="$PATH:/home/runner/.temporalio/bin"
          temporal --version

      - name: Connect to VPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openconnect
          echo "${{ secrets.GLOBALPROTECT_PASSWORD }}" | sudo openconnect \
            --protocol=gp \
            --user="${{ secrets.GLOBALPROTECT_USERNAME }}" \
            --passwd-on-stdin \
            --background \
            "vpnsec.atlan.app"
          sleep 5

      - name: Trigger cleanup workflow (manual config)
        run: |
          export PATH="$PATH:/home/runner/.temporalio/bin"
          WORKFLOW_ID="service-release-parent-${{ needs.detect-cohorts.outputs.service_name }}-$(date +%s)"

          ARGS=$(jq -n \
            --arg ring_name "${{ needs.detect-cohorts.outputs.ring_name }}" \
            --arg service_name "${{ needs.detect-cohorts.outputs.service_name }}" \
            --arg image_tag "" \
            --arg image_repo "${{ needs.detect-cohorts.outputs.image_repo }}" \
            --arg source "${{ needs.detect-cohorts.outputs.resolved_source }}" \
            --arg tenant_names "${{ inputs.tenant_names }}" \
            --arg pull_request_url "${{ needs.detect-cohorts.outputs.pull_request_url }}" \
            --arg path "${{ inputs.path }}" \
            '{
              ringName: $ring_name,
              serviceName: $service_name,
              imageTag: $image_tag,
              imageRepo: $image_repo,
              cohortSource: $source,
              tenantNames: ($tenant_names
                | split(",")
                | map(. | gsub("^ +| +$";""))
                | map(select(. != ""))),
              pullRequestUrl: $pull_request_url,
              path: $path
            }')

          echo "Triggering cleanup workflow: $WORKFLOW_ID"
          echo "Arguments: $ARGS"

          OUTPUT=$(temporal workflow start --tls \
            --address "temporal-server.atlan.com" \
            --namespace "default" \
            --task-queue "control-plane-worker" \
            --type "ServiceReleaseWorkflow" \
            --workflow-id "$WORKFLOW_ID" \
            --input "$ARGS")

          echo "$OUTPUT"
          RUN_ID=$(echo "$OUTPUT" | grep -i "RunId" | awk '{print $2}')
          echo "Cleanup workflow triggered: https://temporal.atlan.com/namespaces/default/workflows/${WORKFLOW_ID}/${RUN_ID}/history"

  cleanup-cohorts:
    needs: detect-cohorts
    if: needs.detect-cohorts.outputs.use_manual_config == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cohort_path: ${{ fromJson(needs.detect-cohorts.outputs.cohort_paths) }}
    steps:
      - name: Setup Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          export PATH="$PATH:/home/runner/.temporalio/bin"
          temporal --version

      - name: Connect to VPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openconnect
          echo "${{ secrets.GLOBALPROTECT_PASSWORD }}" | sudo openconnect \
            --protocol=gp \
            --user="${{ secrets.GLOBALPROTECT_USERNAME }}" \
            --passwd-on-stdin \
            --background \
            "vpnsec.atlan.app"
          sleep 5

      - name: Trigger cleanup workflow for ${{ matrix.cohort_path }}
        run: |
          export PATH="$PATH:/home/runner/.temporalio/bin"
          
          # Extract cohort name for unique workflow ID
          COHORT_NAME=$(basename "${{ matrix.cohort_path }}" .json)
          WORKFLOW_ID="service-release-cleanup-${{ needs.detect-cohorts.outputs.service_name }}-${COHORT_NAME}-$(date +%s)"

          ARGS=$(jq -n \
            --arg ring_name "${{ needs.detect-cohorts.outputs.ring_name }}" \
            --arg service_name "${{ needs.detect-cohorts.outputs.service_name }}" \
            --arg image_tag "" \
            --arg image_repo "${{ needs.detect-cohorts.outputs.image_repo }}" \
            --arg source "github" \
            --arg pull_request_url "${{ needs.detect-cohorts.outputs.pull_request_url }}" \
            --arg path "${{ matrix.cohort_path }}" \
            '{
              ringName: $ring_name,
              serviceName: $service_name,
              imageTag: $image_tag,
              imageRepo: $image_repo,
              cohortSource: $source,
              pullRequestUrl: $pull_request_url,
              path: $path
            }')

          echo "============================================"
          echo "Cleaning up cohort: ${{ matrix.cohort_path }}"
          echo "============================================"
          echo "Workflow ID: $WORKFLOW_ID"
          echo "Arguments: $ARGS"

          OUTPUT=$(temporal workflow start --tls \
            --address "temporal-server.atlan.com" \
            --namespace "default" \
            --task-queue "control-plane-worker" \
            --type "ServiceReleaseWorkflow" \
            --workflow-id "$WORKFLOW_ID" \
            --input "$ARGS")

          echo "$OUTPUT"
          RUN_ID=$(echo "$OUTPUT" | grep -i "RunId" | awk '{print $2}')
          echo ""
          echo "✅ Cleanup triggered for ${COHORT_NAME}"
          echo "   Temporal: https://temporal.atlan.com/namespaces/default/workflows/${WORKFLOW_ID}/${RUN_ID}/history"
